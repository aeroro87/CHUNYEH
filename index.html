<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點餐系統</title>

<style>
body {
  font-family: sans-serif;
  background: #f5e6d3;
  margin: 0;
}

.header {
  padding: 16px;
  background: #e8cfae;
  text-align: center;
  font-weight: bold;
}

.menu-item {
  padding: 12px;
  margin: 10px;
  background: white;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}
.menu-item:hover {
  background: #ffe8cc;
}

.cart-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #d4a373;
  color: white;
  padding: 12px;
  border-radius: 50px;
}

.order-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #6c584c;
  color: white;
  padding: 12px;
  border-radius: 50px;
}
</style>

</head>

<body>

<div class="header">飲料點餐</div>

<div id="menu"></div>

<div class="cart-btn" onclick="openCart()">購物車</div>
<div class="order-btn">訂單查詢</div>

<script>

let cart = [];
let phone = localStorage.getItem("phone") || "";

if(!phone){
  phone = prompt("請輸入手機號碼");
  localStorage.setItem("phone", phone);
}

// 菜單
const menu = [
  {id:1, name:"紅茶", price:30, milk:false},
  {id:2, name:"奶茶", price:40, milk:true}
];

const menuDiv = document.getElementById("menu");

menu.forEach(item=>{
  let div = document.createElement("div");
  div.className = "menu-item";
  div.innerHTML = `${item.name} - $${item.price}`;
  div.onclick = ()=>customize(item);
  menuDiv.appendChild(div);
});

function customize(item){
  let cup = confirm("杯裝？取消為瓶裝");
  let ice = prompt("請輸入 冰 / 去冰");

  if(!ice){
    alert("必須選擇冰塊");
    return;
  }

  let milkAdd = 0;
  if(item.milk){
    if(confirm("加鮮奶 +5？")){
      milkAdd = 5;
    }
  }

  let total = item.price + milkAdd;

  cart.push({
    name: item.name,
    cup: cup ? "杯裝":"瓶裝",
    ice,
    total
  });

  alert("已加入購物車");
}

function openCart(){
  let text = "";
  let sum = 0;

  cart.forEach(c=>{
    text += `${c.name} ${c.cup} ${c.ice} $${c.total}\n`;
    sum += c.total;
  });

  let time = prompt("請輸入取餐時間 (例如 14:30)");

  let orderId = "A" + Date.now();

  fetch("你的GAS API",{
    method:"POST",
    body: JSON.stringify({
      orderId,
      phone,
      cart,
      sum,
      time
    })
  });

  alert(`訂單完成！編號：${orderId}`);
}

</script>

</body>
</html>
