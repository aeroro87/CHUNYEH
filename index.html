<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>春葉 · 線上點餐</title>

  <!-- Google Fonts: Noto Sans TC -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <style>
    /* ===== CSS 變數 ===== */
    :root {
      --cream:    #f8f4ef;
      --almond:   #ede0d4;
      --tan:      #b08968;
      --brown:    #7f5539;
      --dark:     #432818;
      --white:    #ffffff;
      --shadow:   rgba(67, 40, 24, 0.08);
      --shadow-lg: rgba(67, 40, 24, 0.15);
      --radius:   16px;
      --radius-sm: 10px;
      --trans:    0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ===== 基礎重設 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ===== 頂部 Header ===== */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--almond);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px var(--shadow);
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--brown);
      letter-spacing: 0.02em;
    }
    .logo span { color: var(--tan); font-weight: 400; }
    #user-info {
      font-size: 0.9rem;
      color: var(--tan);
      display: none;
      font-weight: 500;
    }
    #user-info strong { color: var(--brown); }

    /* ===== 主容器 ===== */
    main { max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

    /* ===== 登入畫面 ===== */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 80px);
      padding: 24px;
    }
    .login-card {
      background: var(--white);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 12px 40px var(--shadow-lg);
      text-align: center;
      border: 1px solid var(--almond);
    }
    .login-card .icon { 
      width: 90px; 
      height: 90px; 
      margin: 0 auto 24px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid var(--almond);
      box-shadow: 0 4px 12px var(--shadow);
    }
    .login-card .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .login-card h2 { font-size: 1.5rem; color: var(--dark); margin-bottom: 8px; font-weight: 700; }
    .login-card p { font-size: 0.95rem; color: var(--tan); margin-bottom: 32px; }
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid var(--almond);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      background: #faf7f2;
      color: var(--dark);
      outline: none;
      transition: all var(--trans);
      font-family: inherit;
    }
    .input-group input:focus { 
      border-color: var(--tan); 
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(176, 137, 104, 0.1);
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--brown);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--trans);
      box-shadow: 0 4px 12px rgba(127, 85, 57, 0.3);
    }
    .btn-primary:hover { background: var(--dark); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(127, 85, 57, 0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ===== 點餐畫面 ===== */
    #order-screen { display: none; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 分類標籤 */
    .category-tabs {
      display: flex;
      gap: 10px;
      padding: 20px 20px 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 8px 20px;
      border-radius: 25px;
      border: 1.5px solid var(--almond);
      background: var(--white);
      color: var(--tan);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--trans);
    }
    .tab-btn.active {
      background: var(--brown);
      color: var(--white);
      border-color: var(--brown);
      box-shadow: 0 4px 10px rgba(127, 85, 57, 0.2);
    }

    /* 菜單區塊 */
    .menu-section { padding: 10px 20px; }
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--brown);
      margin: 24px 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--almond);
    }
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* 飲品卡片 */
    .drink-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 16px;
      cursor: pointer;
      border: 1px solid var(--almond);
      box-shadow: 0 4px 12px var(--shadow);
      transition: all var(--trans);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .drink-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px var(--shadow-lg);
      border-color: var(--tan);
    }
    .drink-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
      line-height: 1.3;
      padding-right: 24px; /* 為右上角的加號留出空間 */
    }
    .drink-prices {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .price-tag {
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      color: var(--tan);
      font-weight: 500;
    }
    .price-tag .val {
      color: var(--brown);
      font-weight: 700;
    }
    .add-icon {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      background: var(--tan);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      opacity: 0.6; /* 稍微調低初始透明度，更簡約 */
      transition: all var(--trans);
    }
    .drink-card:hover .add-icon { background: var(--brown); transform: scale(1.1); opacity: 1; }

    /* ===== 公告彈窗 ===== */
    .promo-overlay {
      position: fixed;
      inset: 0;
      background: rgba(43, 24, 12, 0.8);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      backdrop-filter: blur(4px);
    }
    .promo-overlay.open { opacity: 1; pointer-events: all; }
    .promo-content {
      background: var(--white);
      width: 100%;
      max-width: 380px;
      border-radius: 24px;
      overflow: hidden;
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .promo-overlay.open .promo-content { transform: scale(1); }
    .promo-img { width: 100%; display: block; }
    .promo-footer { padding: 24px; text-align: center; }

    /* ===== 客製選項彈窗 ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(43, 24, 12, 0.5);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--trans);
      backdrop-filter: blur(2px);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      background: var(--white);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 24px 24px 40px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 40px;
      height: 5px;
      background: var(--almond);
      border-radius: 3px;
      margin: 0 auto 24px;
    }
    .modal-drink-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .modal-drink-emoji { font-size: 2.5rem; }
    .modal-drink-name { font-size: 1.4rem; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
    .modal-drink-price { font-size: 1rem; color: var(--tan); font-weight: 500; }

    .option-group { margin-bottom: 24px; }
    .option-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .option-label .badge {
      font-size: 0.75rem;
      background: var(--almond);
      color: var(--brown);
      padding: 2px 8px;
      border-radius: 12px;
    }
    .option-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    .opt-btn {
      flex: 1;
      min-width: 90px;
      padding: 14px 12px;
      border: 1.5px solid var(--almond);
      border-radius: var(--radius-sm);
      background: #faf7f2;
      color: var(--tan);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--trans);
    }
    .opt-btn.selected {
      background: var(--brown);
      color: var(--white);
      border-color: var(--brown);
      box-shadow: 0 4px 12px rgba(127, 85, 57, 0.2);
    }
    .opt-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .opt-extra { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }

    /* 數量選擇器 */
    .qty-selector {
      display: flex;
      align-items: center;
      gap: 24px;
      justify-content: center;
      background: #faf7f2;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--almond);
    }
    .qty-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--tan);
      background: white;
      color: var(--tan);
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--trans);
    }
    .qty-btn.plus { background: var(--tan); color: white; }
    .qty-btn:active { transform: scale(0.9); }
    #modal-qty { font-size: 1.4rem; font-weight: 700; color: var(--dark); min-width: 40px; text-align: center; }

    .btn-add-cart {
      width: 100%;
      padding: 16px;
      background: var(--brown);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      box-shadow: 0 8px 20px rgba(127, 85, 57, 0.3);
      transition: all var(--trans);
    }
    .btn-add-cart:hover { background: var(--dark); transform: translateY(-2px); }

    /* ===== 購物車與訂單查詢 ===== */
    #cart-panel, #orders-panel { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
    .panel-title { font-size: 1.4rem; font-weight: 700; color: var(--brown); margin-bottom: 24px; }

    .cart-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
      border: 1px solid var(--almond);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cart-item-info h4 { font-size: 1rem; color: var(--dark); margin-bottom: 4px; }
    .cart-item-info p { font-size: 0.85rem; color: var(--tan); }
    .cart-item-price { font-weight: 700; color: var(--brown); }
    .btn-remove { color: #d66; font-size: 0.85rem; border: none; background: none; cursor: pointer; margin-top: 8px; font-weight: 600; }

    .pickup-section {
      background: var(--white);
      padding: 20px;
      border-radius: var(--radius);
      margin: 24px 0;
      border: 1px solid var(--almond);
    }
    .pickup-section label { display: block; font-size: 0.95rem; font-weight: 700; color: var(--brown); margin-bottom: 12px; }
    .pickup-section select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1.5px solid var(--almond);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      background: #faf7f2;
    }

    .total-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-top: 1px dashed var(--almond);
      margin-bottom: 12px;
    }
    .total-bar span { color: var(--tan); font-weight: 500; }
    .total-bar strong { font-size: 1.6rem; color: var(--brown); }

    /* ===== 底部導覽 ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--white);
      display: flex;
      padding: 10px 16px 28px;
      border-top: 1px solid var(--almond);
      box-shadow: 0 -4px 20px var(--shadow);
      z-index: 150;
    }
    .nav-btn {
      flex: 1;
      border: none;
      background: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--tan);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      transition: all var(--trans);
    }
    .nav-btn.active { color: var(--brown); }
    .nav-icon { font-size: 1.4rem; transition: transform var(--trans); }
    .nav-btn.active .nav-icon { transform: translateY(-4px); }
    .cart-badge {
      position: absolute;
      top: -4px;
      right: 20%;
      background: #d66;
      color: white;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(214, 102, 102, 0.4);
    }

    /* 訂單卡片 */
    .order-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid var(--almond);
      box-shadow: 0 4px 12px var(--shadow);
    }
    .order-header { display: flex; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
    .order-id { font-size: 0.85rem; color: var(--tan); font-family: monospace; }
    .order-time { font-size: 0.85rem; color: var(--tan); }
    .order-item { font-size: 0.95rem; margin-bottom: 6px; color: var(--dark); display: flex; justify-content: space-between; }
    .order-total { text-align: right; font-weight: 700; color: var(--brown); margin-top: 12px; font-size: 1.1rem; }

    /* 空狀態與載入中 */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--tan); }
    .loading-spinner {
      width: 30px;
      height: 30px;
      border: 3px solid var(--almond);
      border-top-color: var(--brown);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">春葉手作茶飲</div>
  <div id="user-info">您好，<strong id="display-phone"></strong></div>
</header>

<!-- ===== 登入畫面 ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="icon">
      <img src="https://github.com/aeroro87/CHUNYEH/blob/main/IMG_9192.jpg?raw=true" alt="Logo" id="login-logo">
    </div>
    <h2>歡迎光臨</h2>
    <p>請輸入手機號碼以開始點餐</p>
    <div class="input-group">
      <input type="tel" id="phone-input" placeholder="手機號碼 (例：0912345678)" maxlength="10" inputmode="numeric" oninput="checkUserRecord()" />
    </div>
    <div class="input-group" id="name-group">
      <input type="text" id="name-input" placeholder="您的姓名 / 暱稱" maxlength="20" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">進入點餐</button>
  </div>
</div>

<!-- ===== 公告彈窗 (登入後顯示) ===== -->
<div class="promo-overlay" id="promo-overlay">
  <div class="promo-content">
    <img src="https://github.com/aeroro87/CHUNYEH/blob/main/IMG_7618.JPG?raw=true" alt="最新活動" class="promo-img" id="promo-image">
    <div class="promo-footer">
      <button class="btn-primary" onclick="closePromo()">開始點餐</button>
    </div>
  </div>
</div>

<!-- ===== 點餐主畫面 ===== -->
<main>
  <!-- 菜單 -->
  <div id="order-screen">
    <div class="category-tabs">
      <button class="tab-btn active" id="default-tab" onclick="filterCategory('lols', this)">蓮藕、洛神</button>
      <button class="tab-btn" onclick="filterCategory('flower', this)">花茶類</button>
      <button class="tab-btn" onclick="filterCategory('tea', this)">純茶、冬瓜</button>
      <button class="tab-btn" onclick="filterCategory('other', this)">其他</button>
    </div>
    <div class="menu-section" id="menu-container"></div>
  </div>

  <!-- 購物車面板 -->
  <div id="cart-panel">
    <div class="panel-title">購物車</div>
    <div id="cart-items-container"></div>
    <div id="cart-checkout-area" style="display:none;">
      <div class="pickup-section">
        <label>預計自取時間</label>
        <select id="pickup-time"></select>
      </div>
      <div class="total-bar">
        <span>訂單總金額</span>
        <strong id="cart-total">$0</strong>
      </div>
      <button class="btn-primary" onclick="submitOrder()" id="submit-btn">確認送出訂單</button>
    </div>
    <div id="order-success-area" style="display:none;"></div>
  </div>

  <!-- 訂單查詢面板 -->
  <div id="orders-panel">
    <div class="panel-title">我的訂單</div>
    <div id="orders-container"></div>
  </div>
</main>

<!-- ===== 底部導覽 ===== -->
<nav class="bottom-nav" id="bottom-nav" style="display:none;">
  <button class="nav-btn active" id="nav-menu" onclick="showPanel('menu')">
    <span class="nav-icon">🍵</span>
    <span>菜單</span>
  </button>
  <button class="nav-btn" id="nav-cart" onclick="showPanel('cart')">
    <span class="nav-icon">🛒</span>
    <span>購物車</span>
    <span class="cart-badge" id="cart-badge">0</span>
  </button>
  <button class="nav-btn" id="nav-orders" onclick="showPanel('orders')">
    <span class="nav-icon">📋</span>
    <span>訂單查詢</span>
  </button>
</nav>

<!-- ===== 客製選項彈窗 ===== -->
<div class="modal-overlay" id="drink-modal" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-drink-header">
      <span class="modal-drink-emoji" id="modal-emoji"></span>
      <div>
        <div class="modal-drink-name" id="modal-name">飲品名稱</div>
        <div class="modal-drink-price" id="modal-price">價格資訊</div>
      </div>
    </div>

    <!-- 容器選擇 -->
    <div class="option-group" id="container-option-group">
      <div class="option-label">容器選擇</div>
      <div class="option-buttons" id="modal-cup-options"></div>
    </div>

    <!-- 冰塊選擇 -->
    <div class="option-group" id="ice-option-group">
      <div class="option-label">冰塊選擇</div>
      <div class="option-buttons" id="modal-ice-options">
        <button class="opt-btn selected" data-group="ice" data-value="有冰" onclick="selectOpt(this)">有冰</button>
        <button class="opt-btn" data-group="ice" data-value="去冰" onclick="selectOpt(this)">去冰</button>
      </div>
    </div>

    <!-- 鮮奶加量 -->
    <div class="option-group" id="milk-option" style="display:none;">
      <div class="option-label">鮮奶加量 <span class="badge">+$5</span></div>
      <div class="option-buttons">
        <button class="opt-btn selected" data-group="extraMilk" data-value="不加" onclick="selectOpt(this)">不加</button>
        <button class="opt-btn" data-group="extraMilk" data-value="加量" onclick="selectOpt(this)">加量<div class="opt-extra">+$5</div></button>
      </div>
    </div>

    <!-- 數量選擇 -->
    <div class="option-group">
      <div class="option-label">購買數量</div>
      <div class="qty-selector">
        <button class="qty-btn" onclick="updateQty(-1)">-</button>
        <span id="modal-qty">1</span>
        <button class="qty-btn plus" onclick="updateQty(1)">+</button>
      </div>
    </div>

    <button class="btn-add-cart" onclick="addToCart()">
      <span>加入購物車</span>
      <span id="modal-add-price"></span>
    </button>
  </div>
</div>

<script>
// ===== Firebase 設定 =====
const firebaseConfig = {

  measurementId: "G-3XM61XWT03"

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== 菜單資料 =====
const MENU = [
  { id: 1, name: '蓮藕茶', cupPrice: 50, bottlePrice: 95, hasMilk: false, category: ['lols']},
  { id: 2, name: '蓮藕鮮奶', cupPrice: 60, bottlePrice: 105, hasMilk: true, category: ['lols']},

  { id: 6, name: '紅茶鮮奶', cupPrice: 50, bottlePrice: 85, hasMilk: true, category: ['tea','red']},

  { id: 9, name: '烏龍鮮奶（無糖）', cupPrice: 55, bottlePrice: 90, hasMilk: true, category: ['tea','ol']},

  { id: 12,name: '薰衣草鮮奶茶(含紅茶)', cupPrice: 55, bottlePrice: 100, hasMilk: true, category: ['flower','se']},
  { id: 13,name: '薰衣草鮮奶', cupPrice: 60, bottlePrice: 105, hasMilk: true, category: ['flower','se']},
  { id: 14,name: '玫瑰花茶', cupPrice: 60, bottlePrice: 105, hasMilk: false, category: ['flower','ros']},
  { id: 15,name: '玫瑰洛神', cupPrice: 60, bottlePrice: 105, hasMilk: false, category: ['flower','ros']},
  { id: 16,name: '玫瑰鮮奶茶（含紅茶）', cupPrice: 65, bottlePrice: 115, hasMilk: true, category: ['flower','ros']},
  { id: 17,name: '玫瑰鮮奶', cupPrice: 70, bottlePrice: 120, hasMilk: true, category: ['flower','ros']},
  { id: 18,name: '無糖綠茶', cupPrice: 30, bottlePrice: 65, hasMilk: false, category: ['tea','green']},  
  { id: 19,name: '綠茶鮮奶（無糖）', cupPrice: 50, bottlePrice: 85, hasMilk: true, category: ['tea','green']},
  { id: 20,name: '甘露冬瓜茶', cupPrice: 30, bottlePrice: 60, hasMilk: false, category: ['tea','d']},
  { id: 21,name: '綠茶冬瓜', cupPrice: 30, bottlePrice: 60, hasMilk: false, category: ['tea','green','d']},
  { id: 22,name: '冬瓜鮮奶', cupPrice: 50, bottlePrice: 85, hasMilk: true, category: ['tea','d']},
  // 單一價格商品
  { id: 101, name: '薰衣草茶包', price: 180, category: ['other','tb']},
  { id: 102, name: '薰衣草茶包X2', price: 350, category: ['other','tb']},
  { id: 103, name: '玫瑰花茶包', price: 180, category: ['other','tb']},
  { id: 104, name: '玫瑰花茶包X2', price: 350, category: ['other','tb']},
  { id: 105, name: '薰衣草＋玫瑰花 茶包', price: 350, category: ['other','tb']},
  { id: 106, name: '梅有芒果', price: 150, category: ['other','mg']}
];

const GAS_URL = 'https://script.google.com/macros/s/AKfycbxcpJHNgogEzn6O5AZ87Ii1xu1ffiMSce_W25-qXCj0ojSG_w6PJ01stQ96czSUdBLV/exec';

// ===== 狀態 =====
let currentPhone = '';
let currentUserName = '';
let cart = [];
let currentDrink = null;
let currentOptions = { cup: '杯裝', ice: '有冰', extraMilk: '不加', qty: 1 };

// ===== 初始化 =====
window.onload = function() {
  localStorage.clear();
  console.log('本地儲存空間已清空');
};

function closePromo() {
  document.getElementById('promo-overlay').classList.remove('open');
}

// ===== 登入相關功能 =====
async function checkUserRecord() {
  const phone = document.getElementById('phone-input').value.trim();
  const nameGroup = document.getElementById('name-group');
  const nameInput = document.getElementById('name-input');
  
  if (/^09\d{8}$/.test(phone)) {
    try {
      const doc = await db.collection('users').doc(phone).get();
      if (doc.exists) {
        const savedName = doc.data().name;
        nameGroup.style.display = 'none';
        nameInput.value = savedName;
      } else {
        nameGroup.style.display = 'block';
        nameInput.value = '';
      }
    } catch (e) { console.error("Firebase 查詢失敗", e); }
  }
}

async function doLogin() {
  const phone = document.getElementById('phone-input').value.trim();
  const name = document.getElementById('name-input').value.trim();
  const loginBtn = document.getElementById('login-btn');
  
  if (!/^09\d{8}$/.test(phone)) return alert('請輸入正確的手機號碼');
  if (!name) return alert('請輸入您的姓名');
  
  loginBtn.disabled = true;
  loginBtn.textContent = '登入中...';
  
  try {
    await db.collection('users').doc(phone).set({ name, lastLogin: new Date() });
    currentPhone = phone;
    currentUserName = name;
    
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('bottom-nav').style.display = 'flex';
    document.getElementById('user-info').style.display = 'block';
    document.getElementById('display-phone').textContent = name;
    
    showPanel('menu');
    filterCategory('lols', document.getElementById('default-tab'));
    document.getElementById('promo-overlay').classList.add('open');
  } catch (e) {
    alert('登入失敗，請檢查網路連線');
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = '進入點餐';
  }
}

// ===== 菜單渲染 =====
function renderMenu(items) {
  const container = document.getElementById('menu-container');
  container.innerHTML = '';
  const categories = { 
    				   'lols': '蓮藕、洛神系列（無咖啡因）',
   					   'se': '薰衣草（無咖啡因）', 
   					   'ros': '玫瑰花（無咖啡因）', 
   					   'red': '古早味紅茶',
   					   'green': '無糖綠茶',
   					   'ol': '高山烏龍茶',
   					   'd': '冬瓜茶（無咖啡因）',
    				   'tb': '茶包',
    				   'mg': '梅有芒果'
 					 };

  for (let cat in categories) {
    const catItems = items.filter(i => i.category.includes(cat));
    if (catItems.length === 0) continue;
    
    const section = document.createElement('div');
    section.className = 'menu-section';
    section.innerHTML = `
      <div class="section-title">${categories[cat]}</div>
      <div class="menu-grid">
        ${catItems.map(item => {
          const isSingle = item.price !== undefined;
          return `
            <div class="drink-card" onclick="openModal(${item.id})">
              <div class="add-icon">+</div>
              <div class="drink-name">${item.name}</div>
              <div class="drink-prices">
                ${isSingle ? 
                  `<div class="price-tag"><span>售價</span><span class="val">$${item.price}</span></div>` :
                  `<div class="price-tag"><span>杯裝</span><span class="val">$${item.cupPrice}</span></div>
                   <div class="price-tag"><span>瓶裝</span><span class="val">$${item.bottlePrice}</span></div>`
                }
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    container.appendChild(section);
  }
}

function filterCategory(cat, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu(MENU.filter(i => i.category.includes(cat)));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== 客製選項彈窗 =====
function openModal(id) {
  currentDrink = MENU.find(d => d.id === id);
  const isSingle = currentDrink.price !== undefined;
  
  currentOptions = { cup: isSingle ? '單一價格' : '杯裝', ice: '有冰', extraMilk: '不加', qty: 1 };
  document.getElementById('modal-qty').textContent = '1';
  document.getElementById('modal-emoji').textContent = currentDrink.emoji || '🥤';
  document.getElementById('modal-name').textContent = currentDrink.name;
  
  document.getElementById('modal-price').textContent = isSingle ? 
    `售價 $${currentDrink.price}` : 
    `杯裝 $${currentDrink.cupPrice} / 瓶裝 $${currentDrink.bottlePrice}`;

  const containerGroup = document.getElementById('container-option-group');
  const iceGroup = document.getElementById('ice-option-group');
  
  if (isSingle) {
    containerGroup.style.display = 'none';
    iceGroup.style.display = 'none';
  } else {
    containerGroup.style.display = 'block';
    iceGroup.style.display = 'block';
    document.getElementById('modal-cup-options').innerHTML = `
      <button class="opt-btn selected" data-group="cup" data-value="杯裝" onclick="selectOpt(this)">杯裝<div class="opt-extra">$${currentDrink.cupPrice}</div></button>
      <button class="opt-btn" data-group="cup" data-value="瓶裝" onclick="selectOpt(this)">瓶裝<div class="opt-extra">$${currentDrink.bottlePrice}</div></button>
    `;
  }

  document.getElementById('milk-option').style.display = currentDrink.hasMilk ? 'block' : 'none';
  
  const iceBtns = document.querySelectorAll('#modal-ice-options .opt-btn');
  iceBtns.forEach(b => {
    b.disabled = false;
    b.classList.toggle('selected', b.dataset.value === '有冰');
  });

  updateModalPrice();
  document.getElementById('drink-modal').classList.add('open');
}

function closeModal(e) {
  if (e.target.id === 'drink-modal' || e.target.className === 'modal-handle') document.getElementById('drink-modal').classList.remove('open');
}

function selectOpt(btn) {
  const group = btn.dataset.group;
  const val = btn.dataset.value;
  if (group === 'cup') {
    const iceBtns = document.querySelectorAll('#modal-ice-options .opt-btn');
    if (val === '瓶裝') {
      currentOptions.ice = '去冰';
      iceBtns.forEach(b => {
        b.classList.toggle('selected', b.dataset.value === '去冰');
        if (b.dataset.value === '有冰') b.disabled = true;
      });
    } else { iceBtns.forEach(b => b.disabled = false); }
  }
  document.querySelectorAll(`.opt-btn[data-group="${group}"]`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  currentOptions[group] = val;
  updateModalPrice();
}

function updateQty(delta) {
  currentOptions.qty = Math.max(1, currentOptions.qty + delta);
  document.getElementById('modal-qty').textContent = currentOptions.qty;
  updateModalPrice();
}

function updateModalPrice() {
  if (!currentDrink) return;
  let base = currentDrink.price || (currentOptions.cup === '瓶裝' ? currentDrink.bottlePrice : currentDrink.cupPrice);
  if (currentOptions.extraMilk === '加量') base += 5;
  document.getElementById('modal-add-price').textContent = `$${base * currentOptions.qty}`;
}

// ===== 購物車邏輯 =====
function addToCart() {
  let price = currentDrink.price || (currentOptions.cup === '瓶裝' ? currentDrink.bottlePrice : currentDrink.cupPrice);
  if (currentOptions.extraMilk === '加量') price += 5;
  
  cart.push({
    ...currentDrink,
    options: { ...currentOptions },
    itemTotal: price * currentOptions.qty
  });
  
  updateCartBadge();
  document.getElementById('drink-modal').classList.remove('open');
}

function updateCartBadge() {
  const badge = document.getElementById('cart-badge');
  badge.textContent = cart.length;
  badge.style.display = cart.length > 0 ? 'block' : 'none';
}

function renderCart() {
  const container = document.getElementById('cart-items-container');
  const checkoutArea = document.getElementById('cart-checkout-area');
  container.innerHTML = '';
  
  if (cart.length === 0) {
    container.innerHTML = '<div class="empty-state">購物車空空的，快去點餐吧！</div>';
    checkoutArea.style.display = 'none';
    return;
  }

  checkoutArea.style.display = 'block';
  let total = 0;
  cart.forEach((item, index) => {
    total += item.itemTotal;
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <div class="cart-item-info">
        <h4>${item.name} x ${item.options.qty}</h4>
        <p>${item.options.cup} | ${item.options.ice}${item.hasMilk ? ' | 鮮奶' + item.options.extraMilk : ''}</p>
        <button class="btn-remove" onclick="removeFromCart(${index})">移除</button>
      </div>
      <div class="cart-item-price">$${item.itemTotal}</div>
    `;
    container.appendChild(div);
  });
  
  document.getElementById('cart-total').textContent = `$${total}`;
  updatePickupOptions();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  updateCartBadge();
  renderCart();
}

function updatePickupOptions() {
  const select = document.getElementById('pickup-time');
  select.innerHTML = '';
  const now = new Date();
  const start = new Date();
  start.setHours(9, 30, 0);
  const end = new Date();
  end.setHours(20, 30, 0);
  
  let current = new Date(start);
  let count = 0;
  while (current <= end) {
    // 至少預留 10 分鐘準備
    if (current > new Date(now.getTime() + 10 * 60000)) {
      const timeStr = current.getHours().toString().padStart(2, '0') + ':' + 
                      current.getMinutes().toString().padStart(2, '0');
      const opt = document.createElement('option');
      opt.value = timeStr;
      opt.textContent = timeStr;
      select.appendChild(opt);
      count++;
    }
    current.setMinutes(current.getMinutes() + 10);
  }
  
  if (count === 0) {
    const opt = document.createElement('option');
    opt.textContent = '今日已結束營業';
    select.appendChild(opt);
    document.getElementById('submit-btn').disabled = true;
  } else {
    document.getElementById('submit-btn').disabled = false;
  }
}

async function submitOrder() {
  if (cart.length === 0) return;
  const pickupTime = document.getElementById('pickup-time').value;
  if (pickupTime === '今日已結束營業') return alert('很抱歉，今日已結束營業');

  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = '訂單傳送中...';

  const orderId = 'ORD-' + Date.now().toString().slice(-8) + '-' + Math.floor(Math.random() * 1000);
  const total = cart.reduce((sum, item) => sum + item.itemTotal, 0);
  
  const orderData = {
    orderId,
    phone: currentPhone,
    name: currentUserName,
    items: cart.map(i => ({
      name: i.name,
      cup: i.options.cup,
      ice: i.options.ice,
      extraMilk: i.options.extraMilk,
      qty: i.options.qty,
      price: i.itemTotal
    })),
    total,
    pickupTime,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await db.collection('orders').doc(orderId).set(orderData);
    
    // 傳送到 GAS 發送 LINE
    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(orderData)
    });

    alert('訂單已送出！請準時前往取餐。');
    cart = [];
    updateCartBadge();
    showPanel('orders');
  } catch (e) {
    alert('下單失敗: ' + e.message);
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '確認送出訂單';
  }
}

// ===== 訂單查詢 =====
async function fetchOrders() {
  const container = document.getElementById('orders-container');
  container.innerHTML = '<div class="loading-spinner"></div>';
  
  try {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    const snapshot = await db.collection('orders')
      .where('phone', '==', currentPhone)
      .where('timestamp', '>=', today)
      .orderBy('timestamp', 'desc')
      .get();

    container.innerHTML = '';
    if (snapshot.empty) {
      container.innerHTML = '<div class="empty-state">今天還沒有訂單紀錄喔！</div>';
      return;
    }

    snapshot.forEach(doc => {
      const data = doc.data();
      const div = document.createElement('div');
      div.className = 'order-card';
      div.innerHTML = `
        <div class="order-header">
          <span class="order-id">${data.orderId}</span>
          <span class="order-time">取餐: ${data.pickupTime}</span>
        </div>
        ${data.items.map(i => `
          <div class="order-item">
            <span>${i.name} x ${i.qty}</span>
            <span>$${i.price}</span>
          </div>
        `).join('')}
        <div class="order-total">總計 $${data.total}</div>
      `;
      container.appendChild(div);
    });
  } catch (e) {
    container.innerHTML = '<div class="empty-state">查詢失敗，請稍後再試</div>';
    console.error(e);
  }
}

// ===== 頁面切換 =====
function showPanel(panel) {
  document.getElementById('order-screen').style.display = panel === 'menu' ? 'block' : 'none';
  document.getElementById('cart-panel').style.display = panel === 'cart' ? 'block' : 'none';
  document.getElementById('orders-panel').style.display = panel === 'orders' ? 'block' : 'none';
  
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + panel).classList.add('active');
  
  if (panel === 'cart') renderCart();
  if (panel === 'orders') fetchOrders();
  window.scrollTo(0, 0);
}
</script>
