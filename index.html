<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲料點餐</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>飲品點餐</h1>
</header>

<main>
  <div id="menu"></div>
</main>

<!-- 客製化彈窗 -->
<div id="customModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>

    <label>容器：</label>
    <select id="container">
      <option value="cup">杯裝</option>
      <option value="bottle">瓶裝</option>
    </select>

    <label>冰塊：</label>
    <select id="ice">
      <option value="">請選擇</option>
      <option value="ice">有冰</option>
      <option value="noice">去冰</option>
    </select>

    <label>數量：</label>
    <input type="number" id="qty" value="1" min="1">

    <button onclick="addToCart()">加入購物車</button>
    <button onclick="closeModal()">取消</button>
  </div>
</div>

<!-- 購物車 -->
<div id="cartPanel" class="hidden panel">
  <h2>購物車</h2>
  <div id="cartItems"></div>
  <p>總金額：<span id="total"></span></p>

  <input id="name" placeholder="姓名">
  <input id="phone" placeholder="電話">
  <input type="datetime-local" id="pickupTime">

  <button onclick="submitOrder()">送出訂單</button>
</div>

<!-- 訂單查詢 -->
<div id="orderPanel" class="hidden panel">
  <h2>訂單查詢</h2>
  <input id="orderIdInput" placeholder="輸入訂單編號">
  <button onclick="checkOrder()">查詢</button>
  <div id="orderStatus"></div>
</div>

<div class="bottom-bar">
  <button onclick="toggleCart()">購物車</button>
  <button onclick="toggleOrder()">訂單查詢</button>
</div>

<script src="app.js"></script>
</body>
</html>
