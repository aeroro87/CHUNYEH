<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杏色飲料店</title>
<style>
body { font-family: sans-serif; margin:0; background:#f5e6d3; }
.header { padding:15px; text-align:center; font-size:20px; font-weight:bold; }
.menu-item { background:white; margin:10px; padding:15px; border-radius:12px; cursor:pointer; transition:0.2s; }
.menu-item:hover { background:#ffe8cc; transform:scale(1.02); }
.cart-bar { position:fixed; bottom:0; left:0; right:0; display:flex; }
.cart-bar button { flex:1; padding:15px; border:none; font-size:16px; }
.modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; }
.modal-content { background:white; padding:20px; border-radius:12px; width:90%; max-width:400px; }
.option { margin:10px 0; }
input, select { width:100%; padding:8px; margin-top:5px; }
.progress { margin:20px; }
</style>
</head>
<body>
<div class="header">杏色飲料店</div>
<div id="menu"></div>

<div class="cart-bar">
<button onclick="openCart()">購物車</button>
<button onclick="queryOrder()">訂單查詢</button>
</div>

<div id="modal" class="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const API_URL = "你的GoogleScript API";
let cart = [];
let phone = localStorage.getItem("phone") || "";
if(!phone){ phone = prompt("輸入手機號碼"); localStorage.setItem("phone", phone);} 

const menuData = [
 {id:1,name:"紅茶",price:30,hasMilk:false},
 {id:2,name:"奶茶",price:40,hasMilk:true}
];

function renderMenu(){
 const menu = document.getElementById("menu");
 menu.innerHTML="";
 menuData.forEach(item=>{
  const div=document.createElement("div");
  div.className="menu-item";
  div.innerHTML=`${item.name} $${item.price}`;
  div.onclick=()=>openCustomize(item);
  menu.appendChild(div);
 });
}

function openCustomize(item){
 const modal=document.getElementById("modal");
 const content=document.getElementById("modalContent");
 content.innerHTML=`
 <h3>${item.name}</h3>
 <div class="option">杯型
  <select id="cup">
   <option value="杯裝">杯裝</option>
   <option value="瓶裝">瓶裝</option>
  </select>
 </div>
 <div class="option">冰塊
  <select id="ice">
   <option value="">請選擇</option>
   <option value="有冰">有冰</option>
   <option value="去冰">去冰</option>
  </select>
 </div>
 ${item.hasMilk ? `<div class="option">鮮奶加量
  <select id="milk">
   <option value="0">否</option>
   <option value="5">+5</option>
  </select>
 </div>`:""}
 <div class="option">數量
  <input id="qty" type="number" value="1" min="1" />
 </div>
 <button onclick='addToCart(${JSON.stringify(item)})'>加入購物車</button>
 `;
 modal.style.display="flex";
}

function addToCart(item){
 const ice=document.getElementById("ice").value;
 if(!ice){ alert("請選冰塊"); return; }
 const cup=document.getElementById("cup").value;
 const milk=document.getElementById("milk")?parseInt(document.getElementById("milk").value):0;
 const qty=parseInt(document.getElementById("qty").value);
 cart.push({...item,ice,cup,milk,qty});
 closeModal();
}

function closeModal(){ document.getElementById("modal").style.display="none"; }

function openCart(){
 const modal=document.getElementById("modal");
 const content=document.getElementById("modalContent");
 let html="<h3>購物車</h3>";
 let total=0;
 cart.forEach(i=>{
  let price=(i.price+i.milk)*i.qty;
  total+=price;
  html+=`<div>${i.name} x${i.qty} - $${price}</div>`;
 });
 html+=`<h4>總金額: $${total}</h4>`;
 html+=`<input id="time" type="datetime-local" />`;
 html+=`<button onclick="submitOrder(${total})">送出訂單</button>`;
 content.innerHTML=html;
 modal.style.display="flex";
}

function generateOrderId(){ return "OD"+Date.now(); }

function submitOrder(total){
 const time=document.getElementById("time").value;
 if(!time){ alert("請選時間"); return; }
 const orderId=generateOrderId();
 fetch(API_URL,{method:"POST",body:JSON.stringify({orderId,phone,cart,total,time})})
 .then(()=>{
  alert("成功 訂單號:"+orderId);
  cart=[];
  closeModal();
 });
}

function queryOrder(){
 const id=prompt("輸入訂單號");
 fetch(API_URL+"?id="+id)
 .then(r=>r.json())
 .then(d=>{
  showStatus(d.status);
 });
}

function showStatus(status){
 const modal=document.getElementById("modal");
 const content=document.getElementById("modalContent");
 let step = status=="接單中"?1:status=="製作中"?2:3;
 content.innerHTML=`
 <h3>訂單狀態</h3>
 <div class="progress">
  1.接單中 ${step>=1?"✔":""}<br>
  2.製作中 ${step>=2?"✔":""}<br>
  3.可取餐 ${step>=3?"✔":""}
 </div>`;
 modal.style.display="flex";
}

renderMenu();
</script>
</body>
</html>
