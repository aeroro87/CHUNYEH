<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>點餐系統</title>

<style>
body {
  font-family: Arial;
  background: #FFF5E6;
  margin: 0;
}

.header {
  padding: 15px;
  background: #F5D7B2;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background: #ffe8cc;
}

.btn {
  padding: 14px;
  border: none;
  font-size: 16px;
  border-radius: 12px;
  background: #E6A96B;
  color: white;
  width: 100%;
  margin-top: 10px;
  cursor: pointer;
}

.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
}

.footer button {
  flex: 1;
  padding: 15px;
  border: none;
  background: #D18B47;
  color: white;
}

.modal {
  display: none;
  position: fixed;
  background: rgba(0,0,0,0.5);
  width: 100%;
  height: 100%;
  top: 0;
}

.modal-content {
  background: white;
  margin: 20% auto;
  padding: 20px;
  width: 90%;
  border-radius: 12px;
}

/* 按鈕選擇 */
.option-group {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.option {
  flex: 1;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
}

.option.active {
  background: #E6A96B;
  color: white;
  border: none;
}

.checkout-box {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="header">☕ 點餐系統</div>

<div class="container">

<!-- 登入 -->
<div id="login">
  <input id="phone" placeholder="輸入手機號碼" style="width:100%;padding:10px">
  <button class="btn" onclick="login()">登入</button>
</div>

<!-- 菜單 -->
<div id="menu" style="display:none">
  <div class="card" onclick="openModal('紅茶',30,false)">紅茶 $30</div>
  <div class="card" onclick="openModal('綠茶',30,false)">綠茶 $30</div>
  <div class="card" onclick="openModal('奶茶',40,true)">奶茶 $40</div>
</div>

<!-- 結帳區 -->
<div id="checkoutArea"></div>

</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">

    <h3 id="itemName"></h3>

    <div>杯型</div>
    <div class="option-group">
      <div class="option" onclick="selectOption('type','杯',this)">杯裝</div>
      <div class="option" onclick="selectOption('type','瓶',this)">瓶裝</div>
    </div>

    <div>冰塊</div>
    <div class="option-group">
      <div class="option" onclick="selectOption('ice','正常冰',this)">正常冰</div>
      <div class="option" onclick="selectOption('ice','去冰',this)">去冰</div>
    </div>

    <div id="milkOption" style="display:none">
      <label><input type="checkbox" id="milk"> 鮮奶+5</label>
    </div>

    <button class="btn" onclick="addToCart()">加入</button>
    <button class="btn" onclick="closeModal()">取消</button>

  </div>
</div>

<div class="footer">
  <button onclick="checkout()">結帳</button>
  <button onclick="queryOrder()">訂單查詢</button>
</div>

<script>

let cart = []
let currentItem = {}
let userPhone = ""
let selected = {type:"",ice:""}

// 登入
function login(){
  userPhone = document.getElementById("phone").value
  if(!userPhone) return alert("請輸入手機")
  document.getElementById("login").style.display="none"
  document.getElementById("menu").style.display="block"
}

// Modal
function openModal(name,price,hasMilk){
  currentItem = {name,price,hasMilk}
  selected = {type:"",ice:""}

  document.getElementById("itemName").innerText=name
  document.getElementById("milkOption").style.display = hasMilk ? "block":"none"

  document.querySelectorAll(".option").forEach(o=>o.classList.remove("active"))

  document.getElementById("modal").style.display="block"
}

function closeModal(){
  document.getElementById("modal").style.display="none"
}

// 選擇按鈕
function selectOption(key,value,el){
  selected[key]=value

  let group = el.parentNode.querySelectorAll(".option")
  group.forEach(i=>i.classList.remove("active"))
  el.classList.add("active")

  // 瓶裝自動去冰
  if(key==="type" && value==="瓶"){
    selected.ice="去冰"
    document.querySelectorAll(".option-group")[1]
      .querySelectorAll(".option")[1].classList.add("active")
  }
}

// 加入購物車
function addToCart(){
  if(!selected.type || !selected.ice){
    alert("請選擇杯型與冰塊")
    return
  }

  let milk = document.getElementById("milk").checked ? 5 : 0

  cart.push({
    name: currentItem.name,
    type: selected.type,
    ice: selected.ice,
    price: currentItem.price + milk
  })

  renderCheckout()
  closeModal()
}

// 渲染結帳（整合購物車）
function renderCheckout(){

  let total = 0
  let html = `<div class="checkout-box"><h3>訂單</h3>`

  cart.forEach((i,index)=>{
    total += i.price
    html += `<div>
      ${i.name} ${i.type} ${i.ice} $${i.price}
      <button onclick="removeItem(${index})">❌</button>
    </div>`
  })

  html += `<b>總金額：$${total}</b><br><br>`

  // 時間選單
  html += `取餐時間：
  <select id="pickupTime">`

  generateTimeOptions().forEach(t=>{
    html += `<option value="${t}">${t}</option>`
  })

  html += `</select></div>`

  document.getElementById("checkoutArea").innerHTML = html
}

function removeItem(i){
  cart.splice(i,1)
  renderCheckout()
}

// 時間
function generateTimeOptions(){
  let arr=[]
  for(let h=9;h<=20;h++){
    for(let m=0;m<60;m+=10){
      if(h==9 && m<30) continue
      if(h==20 && m>30) continue
      arr.push(`${h}:${m.toString().padStart(2,'0')}`)
    }
  }
  return arr
}

// 結帳
function checkout(){
  if(cart.length==0) return alert("沒有商品")

  let time = document.getElementById("pickupTime").value
  let total = cart.reduce((s,i)=>s+i.price,0)
  let orderId = "OD"+Date.now()

  let order = {
    orderId,
    phone:userPhone,
    items:cart,
    total,
    time
  }

  sendOrder(order)

  alert(`完成！訂單編號：${orderId}`)

  cart=[]
  renderCheckout()
}

// API
function sendOrder(order){
  fetch("你的GAS API",{
    method:"POST",
    body:JSON.stringify(order)
  })
}

// 查詢
function queryOrder(){
  let phone = prompt("輸入手機")
  alert("之後串API")
}

</script>

</body>
</html>
