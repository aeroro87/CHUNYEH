<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲料點餐</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>飲品點餐</h1>
</header>

<main>
  <div id="menu"></div>
</main>

<!-- 購物車 -->
<div id="cartPanel" class="hidden">
  <h2>購物車</h2>
  <div id="cartItems"></div>
  <label>自取時間：</label>
  <input type="datetime-local" id="pickupTime">
  <button onclick="submitOrder()">送出訂單</button>
</div>

<!-- 訂單查詢 -->
<div id="orderPanel" class="hidden">
  <h2>訂單查詢</h2>
  <input id="orderIdInput" placeholder="輸入訂單編號">
  <button onclick="checkOrder()">查詢</button>
  <div id="orderStatus"></div>
</div>

<!-- 底部按鈕 -->
<div class="bottom-bar">
  <button onclick="toggleCart()">購物車</button>
  <button onclick="toggleOrder()">訂單查詢</button>
</div>

<script src="app.js"></script>
</body>
</html>
