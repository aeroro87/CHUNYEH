<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>春葉 · 線上點餐</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <style>
    /* ===== CSS 變數 ===== */
    :root {
      --cream:    #f5efe6;
      --almond:   #e8d9c5;
      --tan:      #c9a97a;
      --brown:    #7a5c3a;
      --dark:     #3e2c1a;
      --white:    #fffdf9;
      --shadow:   rgba(122, 92, 58, 0.15);
      --radius:   14px;
      --trans:    0.22s ease;
    }

    /* ===== 基礎重設 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ===== 頂部 Header ===== */
    header {
      background: var(--white);
      border-bottom: 2px solid var(--almond);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px var(--shadow);
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--brown);
      letter-spacing: 0.05em;
    }
    .logo span { color: var(--tan); }
    #user-info {
      font-size: 1rem;
      color: var(--brown);
      display: none;
    }
    #user-info strong { color: var(--dark); }

    /* ===== 主容器 ===== */
    main { max-width: 480px; margin: 0 auto; padding: 0 0 120px; }

    /* ===== 登入畫面 ===== */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 30px 24px;
    }
    .login-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px var(--shadow);
      text-align: center;
    }
    .login-card .icon { 
      width: 100px; 
      height: 100px; 
      margin: 0 auto 15px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--almond);
    }
    .login-card .icon img {
      width: 95%;
      height: 100%;
      object-fit: cover;
    }
    .login-card h2 { font-size: 1.3rem; color: var(--brown); margin-bottom: 6px; }
    .login-card p { font-size: 0.88rem; color: #888; margin-bottom: 24px; }
    .input-group {
      position: relative;
      margin-bottom: 16px;
    }
    .input-group input {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid var(--almond);
      border-radius: 10px;
      font-size: 1rem;
      background: var(--cream);
      color: var(--dark);
      outline: none;
      transition: border-color var(--trans);
    }
    .input-group input:focus { border-color: var(--tan); }
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--brown);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--trans), transform 0.1s;
    }
    .btn-primary:hover { background: var(--dark); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ===== 點餐畫面 ===== */
    #order-screen { display: none; }

    /* 分類標籤 */
    .category-tabs {
      display: flex;
      gap: 8px;
      padding: 16px 16px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 7px 18px;
      border-radius: 20px;
      border: 2px solid var(--almond);
      background: var(--white);
      color: var(--brown);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--trans);
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--brown);
      color: var(--white);
      border-color: var(--brown);
    }

    /* 菜單區塊 */
    .menu-section { padding: 16px; }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 12px;
      padding-left: 10px;
      border-left: 4px solid var(--tan);
    }
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* 飲品卡片 */
    .drink-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px 14px;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 0 2px 8px var(--shadow);
      transition: all var(--trans);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .drink-card:hover {
      border-color: var(--tan);
      transform: translateY(-3px);
      box-shadow: 0 6px 18px var(--shadow);
    }
    .drink-card:active { transform: scale(0.97); }
    .drink-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }
    .drink-prices {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .price-tag {
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      color: #666;
    }
    .price-tag .val {
      color: var(--tan);
      font-weight: 700;
    }
    .add-icon {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 26px;
      height: 26px;
      background: var(--tan);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: bold;
      opacity: 0;
      transition: opacity var(--trans);
    }
    .drink-card:hover .add-icon { opacity: 1; }

    /* ===== 公告彈窗 (首頁彈窗) ===== */
    .promo-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .promo-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .promo-content {
      background: var(--white);
      width: 100%;
      max-width: 400px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      transform: scale(0.8);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .promo-overlay.open .promo-content { transform: scale(1); }
    .promo-img {
      width: 100%;
      display: block;
      background: #f0f0f0;
    }
    .promo-footer {
      padding: 20px;
      text-align: center;
    }
    .btn-close-promo {
      width: 100%;
      padding: 12px;
      background: var(--brown);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* ===== 客製選項彈窗 ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(62, 44, 26, 0.45);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--trans);
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-sheet {
      background: var(--white);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 24px 20px 36px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--almond);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-drink-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }
    .modal-drink-name { font-size: 1.2rem; font-weight: 700; color: var(--dark); }
    .modal-drink-price { font-size: 1rem; color: var(--tan); font-weight: 600; }

    /* 選項群組 */
    .option-group { margin-bottom: 20px; }
    .option-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .option-label .badge {
      font-size: 0.7rem;
      background: var(--almond);
      color: var(--brown);
      padding: 2px 7px;
      border-radius: 10px;
    }
    .option-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .opt-btn {
      flex: 1;
      min-width: 80px;
      padding: 12px 10px;
      border: 2px solid var(--almond);
      border-radius: 10px;
      background: var(--cream);
      color: var(--dark);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all var(--trans);
    }
    .opt-btn:hover { border-color: var(--tan); background: var(--almond); }
    .opt-btn.selected {
      background: var(--brown);
      color: var(--white);
      border-color: var(--brown);
    }
    .opt-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: #eee;
      border-color: #ddd;
      color: #aaa;
    }
    .opt-btn .opt-extra { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; }

    /* 加入購物車按鈕 */
    .btn-add-cart {
      width: 100%;
      padding: 15px;
      background: var(--tan);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: background var(--trans), transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-add-cart:hover { background: var(--brown); }
    .btn-add-cart:active { transform: scale(0.98); }

    /* ===== 底部導覽列 ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--white);
      border-top: 2px solid var(--almond);
      display: flex;
      z-index: 150;
      box-shadow: 0 -4px 16px var(--shadow);
    }
    .nav-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: transparent;
      color: var(--brown);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: color var(--trans), background var(--trans);
      position: relative;
    }
    .nav-btn:hover { background: var(--cream); }
    .nav-btn.active { color: var(--tan); }
    .nav-icon { font-size: 1.4rem; }
    .cart-badge {
      position: absolute;
      top: 5px;
      right: 25%;
      background: #e74c3c;
      color: white;
      font-size: 0.7rem;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      font-weight: 700;
      display: none;
    }

    /* ===== 面板共通樣式 ===== */
    #cart-panel, #orders-panel {
      display: none;
      padding: 20px 16px;
    }
    .panel-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 購物車項目 */
    .cart-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 0.95rem; font-weight: 700; color: var(--dark); }
    .cart-item-opts { font-size: 0.8rem; color: #888; margin-top: 2px; }
    .cart-item-price { font-size: 0.95rem; font-weight: 700; color: var(--tan); }
    .cart-item-remove {
      border: none;
      background: #fdeaea;
      color: #e74c3c;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
    }

    /* 結帳區 */
    .pickup-section {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      margin: 20px 0;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .pickup-section label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 10px;
    }
    .pickup-section select {
      width: 100%;
      padding: 10px;
      border: 2px solid var(--almond);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--cream);
      outline: none;
    }
    .total-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: var(--white);
      border-radius: var(--radius);
      margin-bottom: 20px;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .total-bar span { font-size: 1rem; color: var(--brown); font-weight: 600; }
    .total-bar strong { font-size: 1.3rem; color: var(--tan); }

    /* 訂單查詢卡片 */
    .order-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px var(--shadow);
      border-left: 5px solid var(--tan);
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--almond);
    }
    .order-id { font-size: 0.85rem; font-weight: 700; color: var(--brown); }
    .order-time { font-size: 0.8rem; color: #999; }
    .order-pickup {
      font-size: 0.9rem;
      color: var(--tan);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .order-items { font-size: 0.85rem; color: #666; line-height: 1.6; }
    .order-total {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--dark);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--almond);
    }

    /* ===== 成功提示 ===== */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--dark);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 300;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== 訂單成功畫面 ===== */
    .success-screen {
      text-align: center;
      padding: 40px 20px;
    }
    .success-icon { font-size: 4rem; margin-bottom: 16px; }
    .success-screen h3 { font-size: 1.3rem; color: var(--brown); margin-bottom: 8px; }
    .success-screen p { font-size: 0.9rem; color: #888; margin-bottom: 6px; }
    .order-number-display {
      background: var(--almond);
      border-radius: 10px;
      padding: 12px 20px;
      margin: 16px 0;
      font-size: 1rem;
      font-weight: 700;
      color: var(--brown);
    }

    /* ===== 載入動畫 ===== */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== RWD ===== */
    @media (max-width: 360px) {
      .menu-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ===== 首頁公告彈窗 ===== -->
<div class="promo-overlay" id="promo-overlay">
  <div class="promo-content">
    <img src="https://github.com/aeroro87/CHUNYEH/blob/main/IMG_7618.JPG?raw=true" alt="今日推薦" class="promo-img" id="promo-image">
    <div class="promo-footer">
      <button class="btn-close-promo" onclick="closePromo()">開始點餐</button>
    </div>
  </div>
</div>

<!-- ===== Header ===== -->
<header>
  <div class="logo">春葉手作茶飲 <span>·</span> 線上點餐</div>
  <div id="user-info">您好，<strong id="display-phone"></strong></div>
</header>

<!-- ===== Toast 提示 ===== -->
<div class="toast" id="toast"></div>

<!-- ===== 登入畫面 ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="icon">
      <img src="https://github.com/aeroro87/CHUNYEH/blob/main/IMG_9192.jpg?raw=true" alt="Logo" id="login-logo">
    </div>
    <h2>歡迎光臨</h2>
    <p>請輸入手機號碼以開始點餐</p>
    <div class="input-group">
      <input type="tel" id="phone-input" placeholder="手機號碼 (例：0912345678)" maxlength="10" inputmode="numeric" oninput="checkUserRecord()" />
    </div>
    <div class="input-group" id="name-group">
      <input type="text" id="name-input" placeholder="您的姓名 / 暱稱" maxlength="20" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">進入點餐</button>
  </div>
</div>

<!-- ===== 點餐主畫面 ===== -->
<main>
  <!-- 菜單 -->
  <div id="order-screen">
    <div class="category-tabs">
      <button class="tab-btn active" id="default-tab" onclick="filterCategory('lols', this)">蓮藕、洛神</button>
      <button class="tab-btn" onclick="filterCategory('flower', this)">花茶類</button>
      <button class="tab-btn" onclick="filterCategory('tea', this)">純茶、冬瓜</button>
      <button class="tab-btn" onclick="filterCategory('other', this)">其他</button>
    </div>
    <div class="menu-section" id="menu-container"></div>
  </div>

  <!-- 購物車面板 -->
  <div id="cart-panel">
    <div class="panel-title">🛒 購物車</div>
    <div id="cart-items-container"></div>
    <div id="cart-checkout-area" style="display:none;">
      <div class="pickup-section">
        <label>⏰ 預計自取時間</label>
        <select id="pickup-time"></select>
      </div>
      <div class="total-bar">
        <span>訂單總金額</span>
        <strong id="cart-total">$0</strong>
      </div>
      <button class="btn-primary" onclick="submitOrder()" id="submit-btn">確認送出訂單</button>
    </div>
    <div id="order-success-area" style="display:none;"></div>
  </div>

  <!-- 訂單查詢面板 -->
  <div id="orders-panel">
    <div class="panel-title">📋 我的訂單</div>
    <div id="orders-container"></div>
  </div>
</main>

<!-- ===== 底部導覽 ===== -->
<nav class="bottom-nav" id="bottom-nav" style="display:none;">
  <button class="nav-btn active" id="nav-menu" onclick="showPanel('menu')">
    <span class="nav-icon">🍵</span>
    <span>菜單</span>
  </button>
  <button class="nav-btn" id="nav-cart" onclick="showPanel('cart')">
    <span class="nav-icon">🛒</span>
    <span>購物車</span>
    <span class="cart-badge" id="cart-badge">0</span>
  </button>
  <button class="nav-btn" id="nav-orders" onclick="showPanel('orders')">
    <span class="nav-icon">📋</span>
    <span>訂單查詢</span>
  </button>
</nav>

<!-- ===== 客製選項彈窗 ===== -->
<div class="modal-overlay" id="drink-modal" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-drink-header">
      <span class="modal-drink-emoji" id="modal-emoji">🧋</span>
      <div>
        <div class="modal-drink-name" id="modal-name">飲品名稱</div>
        <div class="modal-drink-price" id="modal-price">價格資訊</div>
      </div>
    </div>

    <!-- 杯裝/瓶裝 (僅在有 cupPrice 時顯示) -->
    <div class="option-group" id="container-option-group">
      <div class="option-label">🥤 容器選擇 </div>
      <div class="option-buttons" id="modal-cup-options"></div>
    </div>

    <!-- 冰塊 (僅在非單一價格商品時顯示) -->
    <div class="option-group" id="ice-option-group">
      <div class="option-label">🧊 冰塊選擇 </div>

// ===== 狀態 =====
let currentPhone = '';
let currentUserName = '';
let cart = [];

// ===== 初始化 =====
window.onload = function() {};

// ===== 登入相關功能 (整合 Firebase) =====
async function checkUserRecord() {
  const phone = document.getElementById('phone-input').value.trim();
  const nameGroup = document.getElementById('name-group');
  const nameInput = document.getElementById('name-input');
  
  if (/^09\d{8}$/.test(phone)) {
    let savedName = localStorage.getItem('userName_' + phone);
    if (!savedName) {
      try {
        const doc = await db.collection('users').doc(phone).get();
        if (doc.exists) {
          savedName = doc.data().name;
          localStorage.setItem('userName_' + phone, savedName);
        }
      } catch (e) { console.error("Firebase 查詢失敗", e); }
    }

    if (savedName) {
      nameGroup.style.display = 'none';
      nameInput.value = savedName;
    } else {
      nameGroup.style.display = 'block';
      nameInput.value = '';
    }
  }
}

async function doLogin() {
  const phone = document.getElementById('phone-input').value.trim();
  const name = document.getElementById('name-input').value.trim();
  const loginBtn = document.getElementById('login-btn');
  
  if (!/^09\d{8}$/.test(phone)) return alert('請輸入正確的手機號碼 (10位數字)');
  if (!name) return alert('請輸入您的姓名或暱稱');
  
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="spinner"></span> 登入中...';

  try {
    await db.collection('users').doc(phone).set({
      name: name,
      lastLogin: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    currentPhone = phone;
    currentUserName = name;
    localStorage.setItem('userName_' + phone, name);
    
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('order-screen').style.display = 'block';
    document.getElementById('bottom-nav').style.display = 'flex';
    document.getElementById('user-info').style.display = 'block';
    document.getElementById('display-phone').textContent = `${name} (${phone})`;
    
    showPanel('menu');
    // 預設顯示蓮藕、洛神
    const defaultTab = document.getElementById('default-tab');
    filterCategory('lols', defaultTab);
    document.getElementById('promo-overlay').classList.add('open');
  } catch (e) {
    alert('雲端同步失敗，請檢查網路連線');
    console.error(e);
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = '進入點餐';
  }
}

// ===== 菜單渲染 =====
function renderMenu(items) {
  const container = document.getElementById('menu-container');
  container.innerHTML = '';
  const categories = { 'lols': '蓮藕、洛神系列（無咖啡因）',
   					   'se': '薰衣草（無咖啡因）', 
   					   'ros': '玫瑰花（無咖啡因）', 
   					   'red': '古早味紅茶',
   					   'green': '無糖綠茶',
   					   'ol': '高山烏龍茶',
   					   'd': '冬瓜茶（無咖啡因）',
    				   'tb': '茶包',
    				   'mg': '梅有芒果'
    };

  for (let cat in categories) {
    const catItems = items.filter(i => i.category.includes(cat));
    if (catItems.length === 0) continue;
    const section = document.createElement('div');
    section.className = 'menu-section';
    section.innerHTML = `
      <div class="section-title">${categories[cat]}</div>
      <div class="menu-grid">
        ${catItems.map(item => {
          const isSinglePrice = item.price !== undefined;
          return `
            <div class="drink-card" onclick="openModal(${item.id})">
              <div class="add-icon">+</div>
              <div class="drink-name">${item.name}</div>
              <div class="drink-prices">
                ${isSinglePrice ? 
                  `<div class="price-tag"><span>售價</span><span class="val">$${item.price}</span></div>` :
                  `<div class="price-tag"><span>杯裝</span><span class="val">$${item.cupPrice}</span></div>
                   <div class="price-tag"><span>瓶裝</span><span class="val">$${item.bottlePrice}</span></div>`
                }
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    container.appendChild(section);
  }
}

function filterCategory(cat, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  // 動態切換顯示內容
  const filteredItems = MENU.filter(i => i.category.includes(cat));
  renderMenu(filteredItems);
  
  // 自動捲動到上方
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== 客製選項彈窗 =====
function openModal(id) {
  currentDrink = MENU.find(d => d.id === id);
  const isSinglePrice = currentDrink.price !== undefined;
  
  // 初始化選項
  currentOptions = { cup: isSinglePrice ? '單一價格' : '杯裝', ice: '有冰', extraMilk: '不加', qty: 1 };
  document.getElementById('modal-qty').textContent = '1';
  document.getElementById('modal-emoji').textContent = currentDrink.emoji;
  document.getElementById('modal-name').textContent = currentDrink.name;
  
  // 顯示價格資訊
  document.getElementById('modal-price').textContent = isSinglePrice ? 
    `售價 $${currentDrink.price}` : 
    `杯裝 $${currentDrink.cupPrice} / 瓶裝 $${currentDrink.bottlePrice}`;

  // 容器選擇顯示邏輯
  const containerGroup = document.getElementById('container-option-group');
  if (isSinglePrice) {
    containerGroup.style.display = 'none';
    document.getElementById('ice-option-group').style.display = 'none';
  } else {
    containerGroup.style.display = 'block';
    document.getElementById('ice-option-group').style.display = 'block';
    const cupContainer = document.getElementById('modal-cup-options');
    cupContainer.innerHTML = `
      <button class="opt-btn selected" data-group="cup" data-value="杯裝" onclick="selectOpt(this)">杯裝<div class="opt-extra">$${currentDrink.cupPrice}</div></button>
      <button class="opt-btn" data-group="cup" data-value="瓶裝" onclick="selectOpt(this)">瓶裝<div class="opt-extra">$${currentDrink.bottlePrice}</div></button>
    `;
  }

  // 鮮奶加量顯示邏輯
  document.getElementById('milk-option').style.display = currentDrink.hasMilk ? 'block' : 'none';
  
  // 重置冰塊選項樣式
  const iceBtns = document.querySelectorAll('#modal-ice-options .opt-btn');
  iceBtns.forEach(b => {
    b.disabled = false;
    b.classList.toggle('selected', b.dataset.value === '有冰');
  });

  updateModalPrice();
  document.getElementById('drink-modal').classList.add('open');
}

function closeModal(e) {
  if (e.target.id === 'drink-modal' || e.target.className === 'modal-handle') document.getElementById('drink-modal').classList.remove('open');
}

function selectOpt(btn) {
  const group = btn.dataset.group;
  const val = btn.dataset.value;
  if (group === 'cup') {
    const iceBtns = document.querySelectorAll('#modal-ice-options .opt-btn');
    if (val === '瓶裝') {
      currentOptions.ice = '去冰';
      iceBtns.forEach(b => {
        b.classList.toggle('selected', b.dataset.value === '去冰');
        if (b.dataset.value === '有冰') b.disabled = true;
      });
    } else { iceBtns.forEach(b => b.disabled = false); }
  }
  document.querySelectorAll(`.opt-btn[data-group="${group}"]`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  currentOptions[group] = val;
  updateModalPrice();
}

function updateQty(delta) {
  currentOptions.qty = Math.max(1, currentOptions.qty + delta);
  document.getElementById('modal-qty').textContent = currentOptions.qty;
  updateModalPrice();
}

function updateModalPrice() {
  if (!currentDrink) return;
  let base = 0;
  if (currentDrink.price !== undefined) {
    base = currentDrink.price;
  } else {
    base = currentOptions.cup === '瓶裝' ? currentDrink.bottlePrice : currentDrink.cupPrice;
  }
  if (currentOptions.extraMilk === '加量') base += 5;
  document.getElementById('modal-add-price').textContent = `$${base * currentOptions.qty}`;
}

// ===== 購物車與訂單邏輯 =====
function addToCart() {
  if (!currentDrink) return;
  const isSingle = currentDrink.price !== undefined;
  let basePrice = isSingle ? currentDrink.price : (currentOptions.cup === '瓶裝' ? currentDrink.bottlePrice : currentDrink.cupPrice);
  let unitTotal = basePrice + (currentOptions.extraMilk === '加量' ? 5 : 0);
  
  cart.push({ 
    id: Date.now(), 
    drinkId: currentDrink.id, 
    name: currentDrink.name, 
    emoji: currentDrink.emoji || '', 
    price: basePrice, 
    cup: isSingle ? '' : (currentOptions.cup || ''), 
    ice: isSingle ? '' : (currentOptions.ice || ''), 
    extraMilk: currentOptions.extraMilk === '加量', 
    qty: currentOptions.qty || 1, 
    unitTotal: unitTotal, 
    itemTotal: unitTotal * (currentOptions.qty || 1)
  });
  
  updateCartBadge();
  document.getElementById('drink-modal').classList.remove('open');
  showToast(`已加入：${currentDrink.name} x ${currentOptions.qty}`);
}

function updateCartBadge() {
  const badge = document.getElementById('cart-badge');
  const count = cart.reduce((sum, item) => sum + item.qty, 0);
  badge.textContent = count;
  badge.style.display = count > 0 ? 'flex' : 'none';
}

function renderCart() {
  const container = document.getElementById('cart-items-container');
  const checkoutArea = document.getElementById('cart-checkout-area');
  if (cart.length === 0) { container.innerHTML = '<div style="text-align:center; padding:40px; color:#999;">購物車是空的</div>'; checkoutArea.style.display = 'none'; return; }
  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name} ${item.cup ? `(${item.cup})` : ''} x ${item.qty}</div>
        <div class="cart-item-opts">${item.ice ? item.ice : ''}${item.extraMilk ? (item.ice ? ' · ' : '') + '鮮奶加量' : ''}</div>
      </div>
      <div class="cart-item-price">$${item.itemTotal}</div>
      <button class="cart-item-remove" onclick="removeFromCart(${item.id})">✕</button>
    </div>
  `).join('');
  document.getElementById('cart-total').textContent = `$${cart.reduce((sum, i) => sum + i.itemTotal, 0)}`;
  checkoutArea.style.display = 'block';
  generatePickupTimes();
}

function removeFromCart(id) { cart = cart.filter(i => i.id !== id); updateCartBadge(); renderCart(); }

function generatePickupTimes() {
  const select = document.getElementById('pickup-time');
  select.innerHTML = '';
  const now = new Date();
  let hasOptions = false;
  for (let h = 9; h <= 20; h++) {
    for (let m = 0; m < 60; m += 10) {
      if ((h === 9 && m < 30) || (h === 20 && m > 30)) continue;
      const optTime = new Date(); optTime.setHours(h, m, 0);
      if (optTime > new Date(now.getTime() + 10 * 60000)) {
        const timeStr = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        select.innerHTML += `<option value="${timeStr}">${timeStr}</option>`;
        hasOptions = true;
      }
    }
  }
  const btn = document.getElementById('submit-btn');
  if (!hasOptions) { select.innerHTML = '<option value="">今日已結束營業</option>'; btn.disabled = true; btn.style.opacity = '0.5'; }
  else { btn.disabled = false; btn.style.opacity = '1'; }
}

async function submitOrder() {
  const pickupTime = document.getElementById('pickup-time').value;
  if (!pickupTime) return alert('目前非營業時間');
  const btn = document.getElementById('submit-btn');
  const originalText = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 處理中...';
  
  const orderId = `ORD-${Date.now().toString().slice(-8)}-${Math.floor(Math.random()*1000).toString().padStart(3, '0')}`;
  const orderData = {
    orderId,
    phone: currentPhone,
    userName: currentUserName,
    items: cart,
    totalAmount: cart.reduce((sum, i) => sum + i.itemTotal, 0),
    pickupTime,
    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
    displayTime: new Date().toLocaleString()
  };

  try {
    console.log("正在嘗試寫入 Firebase...", orderData);
    await db.collection('orders').doc(orderId).set(orderData);
    console.log("Firebase 寫入成功");
    
    if (GAS_URL && GAS_URL !== 'YOUR_GAS_WEB_APP_URL') {
      console.log("正在發送 LINE 通知...");
      fetch(GAS_URL, { 
        method: 'POST', 
        mode: 'no-cors',
        cache: 'no-cache',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'submitOrder', order: { ...orderData, timestamp: orderData.displayTime } }) 
      }).then(() => console.log("LINE 通知已發送 (no-cors 模式)"));
    }
    
    showOrderSuccess(orderId);
    cart = [];
    updateCartBadge();
    renderCart(); // 💡 關鍵：立即重新渲染購物車介面，顯示「購物車是空的」
  } catch (e) {
    console.error("下單過程出錯:", e);
    let errorMsg = '下單失敗，原因：' + (e.message || '未知錯誤');
    if (e.message && e.message.includes('permission-denied')) {
      errorMsg = '下單失敗：Firebase 資料庫權限不足，請檢查 Rules 設定。';
    }
    alert(errorMsg);
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
}

function showOrderSuccess(orderId) {
  document.getElementById('cart-checkout-area').style.display = 'none';
  document.getElementById('order-success-area').style.display = 'block';
  document.getElementById('order-success-area').innerHTML = `<div class="success-screen"><div class="success-icon">✅</div><h3>訂單已送出！</h3><p>請於預約時間前往自取</p><div class="order-number-display">訂單編號：${orderId}</div><button class="btn-primary" onclick="showPanel('orders')" style="margin-top:10px;">查看我的訂單</button></div>`;
}

async function renderOrders() {
  const container = document.getElementById('orders-container');
  container.innerHTML = '<div style="text-align:center; padding:40px;"><span class="spinner" style="border-top-color:var(--tan);"></span> 載入中...</div>';
  
  try {
    const today = new Date();
    today.setHours(0,0,0,0);
    const snapshot = await db.collection('orders')
      .where('phone', '==', currentPhone)
      .where('timestamp', '>=', today)
      .orderBy('timestamp', 'desc')
      .get();

    if (snapshot.empty) {
      container.innerHTML = '<div style="text-align:center; padding:40px; color:#999;">今日尚無紀錄</div>';
      return;
    }

    container.innerHTML = snapshot.docs.map(doc => {
      const o = doc.data();
      return `
        <div class="order-card">
          <div class="order-header"><span class="order-id">${o.orderId}</span><span class="order-time">${o.displayTime.split(' ')[1]}</span></div>
          <div class="order-pickup">⏰ 預計取餐：${o.pickupTime}</div>
          <div class="order-items">${o.items.map(i => `${i.name}${i.cup ? `(${i.cup})` : ''} x ${i.qty} ${i.ice ? i.ice : ''}${i.extraMilk ? '·鮮奶加量' : ''} $${i.itemTotal}`).join('<br/>')}</div>
          <div class="order-total">總計：$${o.totalAmount}</div>
        </div>
      `;
    }).join('');
  } catch (e) {
    container.innerHTML = '<div style="text-align:center; padding:40px; color:#e74c3c;">載入失敗，請稍後再試</div>';
    console.error(e);
  }
}

function showPanel(panel) {
  document.getElementById('order-screen').style.display = panel === 'menu' ? 'block' : 'none';
  document.getElementById('cart-panel').style.display = panel === 'cart' ? 'block' : 'none';
  document.getElementById('orders-panel').style.display = panel === 'orders' ? 'block' : 'none';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + panel).classList.add('active');
  if (panel === 'cart') { document.getElementById('order-success-area').style.display = 'none'; renderCart(); }
  if (panel === 'orders') renderOrders();
}

function showToast(msg) {
  const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
</script>
</body>
