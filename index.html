<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點餐系統</title>
<style>
body { font-family: sans-serif; margin:0; background:#f5e6d3; }
.header { padding:15px; text-align:center; font-size:20px; font-weight:bold; }
.menu-item { background:white; margin:10px; padding:15px; border-radius:10px; cursor:pointer; }
.menu-item:hover { background:#ffe8cc; }
.cart-btn { position:fixed; bottom:10px; left:10px; right:10px; display:flex; justify-content:space-between; }
button { padding:10px 20px; border:none; border-radius:10px; }
</style>
</head>
<body>
<div class="header">杏色飲料店</div>

<div id="menu"></div>

<div class="cart-btn">
<button onclick="viewCart()">購物車</button>
<button onclick="queryOrder()">訂單查詢</button>
</div>

<script>
const API_URL = "你的GoogleScript API";
let cart = [];
let phone = localStorage.getItem("phone") || "";

if(!phone){
  phone = prompt("請輸入手機號碼登入");
  localStorage.setItem("phone", phone);
}

const menuData = [
  {id:1,name:"紅茶",price:30,hasMilk:false},
  {id:2,name:"奶茶",price:40,hasMilk:true}
];

function renderMenu(){
  const menu = document.getElementById("menu");
  menu.innerHTML = "";
  menuData.forEach(item=>{
    const div = document.createElement("div");
    div.className = "menu-item";
    div.innerHTML = `${item.name} - $${item.price}`;
    div.onclick = ()=>customize(item);
    menu.appendChild(div);
  });
}

function customize(item){
  let ice = prompt("選擇冰塊: 有冰/去冰");
  if(!ice) return;
  let milkAdd = 0;
  if(item.hasMilk){
    if(confirm("是否加鮮奶+5？")) milkAdd = 5;
  }
  cart.push({...item, ice, milkAdd, qty:1});
  alert("已加入購物車");
}

function viewCart(){
  let text = cart.map(i=>`${i.name} x${i.qty}`).join("\n");
  let total = cart.reduce((sum,i)=>sum+i.price+i.milkAdd,0);
  if(confirm(text+"\n總金額:"+total+"\n送出訂單？")){
    submitOrder(total);
  }
}

function generateOrderId(){
  return "OD" + Date.now();
}

function submitOrder(total){
  const orderId = generateOrderId();
  const time = prompt("輸入取餐時間");

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      orderId,
      phone,
      cart,
      total,
      time
    })
  }).then(()=>{
    alert("訂單成功！取餐號碼:"+orderId);
    cart=[];
  });
}

function queryOrder(){
  const id = prompt("輸入訂單號碼");
  fetch(API_URL+"?id="+id)
  .then(r=>r.json())
  .then(d=>alert("狀態:"+d.status));
}

renderMenu();
</script>
</body>
</html>
