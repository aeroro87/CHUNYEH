<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點餐系統</title>

<style>
body {
  font-family: Arial;
  background: #FFF5E6;
  margin: 0;
}

.header {
  padding: 15px;
  background: #F5D7B2;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background: #ffe8cc;
}

.btn {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #E6A96B;
  color: white;
  width: 100%;
  margin-top: 10px;
  cursor: pointer;
}

.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
}

.footer button {
  flex: 1;
  padding: 15px;
  border: none;
  background: #D18B47;
  color: white;
}

.modal {
  display: none;
  position: fixed;
  background: rgba(0,0,0,0.5);
  width: 100%;
  height: 100%;
  top: 0;
}

.modal-content {
  background: white;
  margin: 20% auto;
  padding: 20px;
  width: 90%;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="header">☕ 點餐系統</div>

<div class="container">

<!-- 登入 -->
<div id="login">
  <input id="phone" placeholder="輸入手機號碼" style="width:100%;padding:10px">
  <button class="btn" onclick="login()">登入</button>
</div>

<!-- 菜單 -->
<div id="menu" style="display:none">
  <div class="card" onclick="openModal('紅茶',30,true)">紅茶 $30</div>
  <div class="card" onclick="openModal('綠茶',30,false)">綠茶 $30</div>
  <div class="card" onclick="openModal('奶茶',40,true)">奶茶 $40</div>
</div>

<!-- 購物車 -->
<div id="cart"></div>

</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="itemName"></h3>

    杯型：
    <select id="type">
      <option value="杯">杯裝</option>
      <option value="瓶">瓶裝</option>
    </select>

    冰塊：
    <select id="ice">
      <option value="">請選擇</option>
      <option value="正常冰">正常冰</option>
      <option value="去冰">去冰</option>
    </select>

    <div id="milkOption" style="display:none">
      鮮奶+5：
      <input type="checkbox" id="milk">
    </div>

    <button class="btn" onclick="addToCart()">加入購物車</button>
    <button class="btn" onclick="closeModal()">取消</button>
  </div>
</div>

<!-- footer -->
<div class="footer">
  <button onclick="checkout()">結帳</button>
  <button onclick="queryOrder()">訂單查詢</button>
</div>

<script>

let cart = []
let currentItem = {}
let userPhone = ""

function login(){
  userPhone = document.getElementById("phone").value
  if(!userPhone) return alert("請輸入手機")
  document.getElementById("login").style.display="none"
  document.getElementById("menu").style.display="block"
}

function openModal(name,price,hasMilk){
  currentItem = {name,price,hasMilk}
  document.getElementById("itemName").innerText=name

  document.getElementById("milkOption").style.display = hasMilk ? "block":"none"

  document.getElementById("modal").style.display="block"
}

function closeModal(){
  document.getElementById("modal").style.display="none"
}

function addToCart(){
  let type = document.getElementById("type").value
  let ice = document.getElementById("ice").value

  if(!ice){
    alert("請選擇冰塊")
    return
  }

  let milk = document.getElementById("milk").checked ? 5 : 0

  let item = {
    name: currentItem.name,
    type,
    ice,
    price: currentItem.price + milk
  }

  cart.push(item)
  renderCart()
  closeModal()
}

function renderCart(){
  let html = "<h3>購物車</h3>"
  let total = 0

  cart.forEach((i,index)=>{
    total += i.price
    html += `<div>${i.name} ${i.type} ${i.ice} $${i.price}
    <button onclick="removeItem(${index})">刪除</button></div>`
  })

  html += `<b>總金額: $${total}</b>`

  document.getElementById("cart").innerHTML = html
}

function removeItem(i){
  cart.splice(i,1)
  renderCart()
}

function generateTimeOptions(){
  let times=[]
  for(let h=9;h<=20;h++){
    for(let m=0;m<60;m+=10){
      if(h==9 && m<30) continue
      if(h==20 && m>30) continue
      times.push(`${h}:${m.toString().padStart(2,'0')}`)
    }
  }
  return times
}

function checkout(){
  if(cart.length==0) return alert("購物車是空的")

  let time = prompt("請輸入取餐時間，例如 12:30")

  let orderId = "OD"+Date.now()

  let total = cart.reduce((sum,i)=>sum+i.price,0)

  let order = {
    orderId,
    phone:userPhone,
    items:cart,
    total,
    time
  }

  sendOrder(order)

  alert("訂單完成！編號："+orderId)

  cart=[]
  renderCart()
}

function sendOrder(order){
  fetch("你的GAS API網址",{
    method:"POST",
    body:JSON.stringify(order)
  })
}

function queryOrder(){
  let phone = prompt("輸入手機號碼")
  alert("這裡之後串API查詢")
}

</script>

</body>
</html>
